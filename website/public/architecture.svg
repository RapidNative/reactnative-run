<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <!-- Background -->
  <rect width="800" height="420" rx="16" fill="#0c0c14"/>

  <!-- Browser box -->
  <rect x="40" y="30" width="340" height="360" rx="12" fill="#141420" stroke="#2a2a3a" stroke-width="1.5"/>
  <text x="60" y="58" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#94a3b8">BROWSER</text>
  <text x="60" y="76" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">reactnative.run/playground</text>

  <!-- VirtualFS -->
  <rect x="60" y="94" width="300" height="44" rx="8" fill="#1a1a2e" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
  <text x="80" y="120" font-family="monospace" font-size="12" font-weight="600" fill="#60a5fa">VirtualFS</text>
  <text x="170" y="120" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">In-memory file system</text>

  <!-- browser-metro -->
  <rect x="60" y="150" width="300" height="148" rx="8" fill="#1a1a2e" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
  <text x="80" y="176" font-family="monospace" font-size="12" font-weight="600" fill="#4ade80">browser-metro</text>

  <text x="80" y="198" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">1. Walk dependency graph</text>
  <text x="80" y="216" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">2. Transform TS/JSX (Sucrase)</text>
  <text x="80" y="234" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">3. Rewrite require() calls</text>
  <text x="80" y="252" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">4. Fetch npm packages</text>
  <text x="80" y="270" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">5. Emit bundle + HMR updates</text>
  <text x="80" y="288" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">6. Source maps</text>

  <!-- iframe -->
  <rect x="60" y="310" width="300" height="60" rx="8" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.3"/>
  <text x="80" y="336" font-family="monospace" font-size="12" font-weight="600" fill="#a78bfa">Sandboxed iframe</text>
  <text x="80" y="354" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">HMR runtime + React Refresh</text>

  <!-- Arrow down: VirtualFS to bundler -->
  <line x1="210" y1="138" x2="210" y2="150" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow down: bundler to iframe -->
  <line x1="210" y1="298" x2="210" y2="310" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ESM Server box -->
  <rect x="440" y="94" width="320" height="220" rx="12" fill="#141420" stroke="#2a2a3a" stroke-width="1.5"/>
  <text x="460" y="122" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#94a3b8">ESM PACKAGE SERVER</text>
  <text x="460" y="140" font-family="monospace" font-size="10" fill="#f59e0b">esm.reactnative.run</text>

  <!-- ESM steps -->
  <rect x="460" y="156" width="280" height="140" rx="8" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>
  <text x="480" y="178" font-family="monospace" font-size="12" font-weight="600" fill="#fbbf24">reactnative-esm</text>

  <text x="480" y="200" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">1. Receive GET /pkg/lodash@4</text>
  <text x="480" y="218" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">2. npm install in temp dir</text>
  <text x="480" y="236" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">3. Bundle with esbuild (IIFE)</text>
  <text x="480" y="254" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">4. Externalize all deps</text>
  <text x="480" y="272" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">5. Cache + return X-Externals</text>

  <!-- Arrow: bundler to ESM -->
  <path d="M360 230 L440 230" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrowBlue)"/>
  <text x="370" y="222" font-family="monospace" font-size="9" fill="#60a5fa">fetch /pkg/*</text>

  <!-- Arrow: ESM back to bundler -->
  <path d="M440 250 L360 250" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrowGreen)"/>
  <text x="370" y="265" font-family="monospace" font-size="9" fill="#4ade80">JS bundle</text>

  <!-- Labels at bottom -->
  <rect x="440" y="340" width="320" height="50" rx="8" fill="#1a1a2e" stroke="#2a2a3a" stroke-width="1"/>
  <text x="460" y="362" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Any npm package works without config.</text>
  <text x="460" y="378" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Cached after first request for instant reuse.</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80"/>
    </marker>
  </defs>
</svg>
