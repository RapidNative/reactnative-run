<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#1e1e2e"/>

  <!-- React Native orbits -->
  <g transform="translate(32,32)" fill="none" stroke="#61dafb" stroke-width="2">
    <!-- Horizontal ellipse -->
    <ellipse rx="18" ry="7" opacity="0.6"/>
    <!-- 60deg ellipse -->
    <ellipse rx="18" ry="7" transform="rotate(60)" opacity="0.6"/>
    <!-- 120deg ellipse -->
    <ellipse rx="18" ry="7" transform="rotate(120)" opacity="0.6"/>
  </g>

  <!-- Play button triangle -->
  <polygon points="28,22 28,42 44,32" fill="#61dafb"/>
</svg>
