<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#09090b"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#18181b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Gradient glow -->
  <ellipse cx="600" cy="280" rx="400" ry="200" fill="#22d3ee" opacity="0.05"/>

  <!-- Logo orbits -->
  <g transform="translate(600,240)" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.2">
    <ellipse rx="80" ry="30"/>
    <ellipse rx="80" ry="30" transform="rotate(60)"/>
    <ellipse rx="80" ry="30" transform="rotate(120)"/>
  </g>

  <!-- Play triangle -->
  <polygon points="580,220 580,260 612,240" fill="#22d3ee" opacity="0.4"/>

  <!-- Title -->
  <text x="600" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="white">
    reactnative.run
  </text>

  <!-- Subtitle -->
  <text x="600" y="410" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#a1a1aa">
    Run React Native in your browser
  </text>

  <!-- Tags -->
  <g transform="translate(600,470)" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#22d3ee" opacity="0.7">
    <text x="-200">HMR</text>
    <text x="-100">Expo Router</text>
    <text x="0">TypeScript</text>
    <text x="100">npm packages</text>
    <text x="220">Source Maps</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#18181b"/>
  <text x="40" y="612" font-family="system-ui, sans-serif" font-size="16" fill="#71717a">by RapidNative</text>
  <text x="1160" y="612" text-anchor="end" font-family="system-ui, sans-serif" font-size="16" fill="#71717a">Open Source (MIT)</text>
</svg>
